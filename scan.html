<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫スキャナー</title>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; }
  #video-container { position: relative; width: 100%; max-width: 480px; margin: 0 auto; }
  video { width: 100%; border-radius: 8px; background: #000; }
  #status { text-align: center; margin-top: 16px; font-size: 16px; min-height: 24px; }
  #status.ok { color: #4caf50; }
  #status.ng { color: #f44336; }
  a.admin-link { display: block; text-align: center; margin-top: 24px; color: #90caf9; }
  #product-link { display: none; text-align: center; margin-top: 12px; }
  #product-link a { display: inline-block; font-size: 16px; padding: 12px 24px; border-radius: 8px; background: #1976d2; color: #fff; text-decoration: none; }
  #register-link { display: none; text-align: center; margin-top: 12px; }
  #register-link a { display: inline-block; font-size: 16px; padding: 12px 24px; border-radius: 8px; background: #444; color: #eee; text-decoration: none; }
  button.rescan { display: block; margin: 12px auto 0; font-size: 14px; padding: 6px 14px; border-radius: 6px; border: none; background: #444; color: #eee; }
</style>
</head>
<body>
<h1>JANコードをカメラにかざしてください</h1>
<div id="video-container">
  <video id="video" muted playsinline></video>
</div>
<div id="status"></div>
<div id="product-link"><a id="product-link-a" href="#" target="_blank" rel="noopener noreferrer">商品ページを開く</a></div>
<div id="register-link"><a id="register-link-a" href="#">このJANコードを登録する</a></div>
<button class="rescan" id="rescan-btn" type="button" style="display:none;">別の商品をスキャン</button>
<a class="admin-link" href="admin.html">未登録商品の登録はこちら</a>

<script src="config.js"></script>
<script>
const statusEl = document.getElementById('status');
const productLinkEl = document.getElementById('product-link');
const productLinkA = document.getElementById('product-link-a');
const registerLinkEl = document.getElementById('register-link');
const registerLinkA = document.getElementById('register-link-a');
const rescanBtn = document.getElementById('rescan-btn');
const codeReader = new ZXing.BrowserMultiFormatReader();
let handled = false;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || '';
}

function resetScan() {
  handled = false;
  productLinkEl.style.display = 'none';
  registerLinkEl.style.display = 'none';
  rescanBtn.style.display = 'none';
  setStatus('');
}

rescanBtn.addEventListener('click', resetScan);

async function lookup(jan) {
  setStatus(`JANコード ${jan} を検索中...`);
  try {
    const res = await fetch(`${GAS_API_URL}?jan=${encodeURIComponent(jan)}`);
    const data = await res.json();
    if (data.success && data.found) {
      setStatus(`JANコード ${jan} が見つかりました`, 'ok');
      productLinkA.href = data.url;
      productLinkEl.style.display = 'block';
      rescanBtn.style.display = 'block';
    } else {
      setStatus(`未登録のJANコードです（${jan}）`, 'ng');
      registerLinkA.href = `admin.html?jan=${encodeURIComponent(jan)}`;
      registerLinkEl.style.display = 'block';
      rescanBtn.style.display = 'block';
    }
  } catch (err) {
    setStatus('通信エラーが発生しました', 'ng');
    handled = false;
  }
}

codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
  if (result && !handled) {
    handled = true;
    lookup(result.getText());
  }
}).catch(err => {
  setStatus('カメラを起動できませんでした: ' + err.message, 'ng');
});
</script>
</body>
</html>
