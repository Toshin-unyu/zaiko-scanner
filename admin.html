<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫スキャナー 管理画面</title>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; }
  #video-container { position: relative; width: 100%; max-width: 480px; margin: 0 auto; }
  video { width: 100%; border-radius: 8px; background: #000; display: block; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  button.rescan { display: block; margin: 8px auto 0; font-size: 14px; padding: 6px 14px; border-radius: 6px; border: none; background: #444; color: #eee; }
  form { max-width: 480px; margin: 16px auto; display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 13px; color: #aaa; }
  input { font-size: 16px; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; }
  button { font-size: 16px; padding: 10px; border-radius: 6px; border: none; background: #1976d2; color: #fff; }
  button:active { background: #1565c0; }
  #status { text-align: center; margin-top: 12px; font-size: 15px; min-height: 22px; }
  #status.ok { color: #4caf50; }
  #status.ng { color: #f44336; }
  a.back-link { display: block; text-align: center; margin-top: 20px; color: #90caf9; }
</style>
</head>
<body>
<h1>JANコード登録</h1>
<div id="video-container">
  <video id="video" muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>
<button class="rescan" id="rescan-btn" type="button">再スキャン</button>

<form id="form">
  <label for="jan">JANコード</label>
  <input id="jan" name="jan" type="text" inputmode="numeric" placeholder="カメラで読み取るか手入力" required>
  <label for="url">商品ページURL</label>
  <input id="url" name="url" type="url" placeholder="https://www.solel-arena.jp/..." required>
  <button type="submit" id="submit-btn">登録する</button>
</form>
<div id="status"></div>
<a class="back-link" href="scan.html">スキャン画面に戻る</a>
<a class="back-link" href="domains.html">許可ドメインの管理はこちら</a>
<a class="back-link" href="products.html">登録商品の一覧・編集・削除はこちら</a>

<script src="config.js"></script>
<script>
const statusEl = document.getElementById('status');
const janInput = document.getElementById('jan');
const urlInput = document.getElementById('url');
const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const codeReader = new ZXing.BrowserMultiFormatReader();
let handled = false;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || '';
}

const prefilledJan = new URLSearchParams(window.location.search).get('jan');
if (prefilledJan) {
  janInput.value = prefilledJan;
  handled = true;
}

function drawBox(points) {
  if (!video.videoWidth) return;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!points || points.length === 0) return;
  ctx.strokeStyle = '#4caf50';
  ctx.lineWidth = 4;
  ctx.beginPath();
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.getX(), p.getY());
    else ctx.lineTo(p.getX(), p.getY());
  });
  ctx.closePath();
  ctx.stroke();
}

function clearBox() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

document.getElementById('rescan-btn').addEventListener('click', () => {
  handled = false;
  clearBox();
  setStatus('');
});

codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
  if (result) {
    drawBox(result.getResultPoints());
    if (!handled) {
      handled = true;
      janInput.value = result.getText();
      setStatus(`読み取り値: ${result.getText()}（枠内の内容を確認し、違う場合は「再スキャン」を押してください）`, 'ok');
    }
  }
}).catch(err => {
  setStatus('カメラを起動できませんでした: ' + err.message, 'ng');
});

const submitBtn = document.getElementById('submit-btn');

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  setStatus('登録中...');
  try {
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ jan: janInput.value.trim(), url: urlInput.value.trim() })
    });
    const data = await res.json();
    if (data.success) {
      setStatus(data.updated ? '既存データを更新しました' : '新規登録しました', 'ok');
      urlInput.value = '';
      janInput.value = '';
      handled = false;
      clearBox();
    } else {
      setStatus(data.message || '登録に失敗しました', 'ng');
    }
  } catch (err) {
    setStatus('通信エラーが発生しました', 'ng');
  } finally {
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
